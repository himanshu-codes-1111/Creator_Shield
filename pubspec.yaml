name: creator_proof
description: "Creator Proof – Blockchain-verified creative ownership platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.2.7
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  dotted_border: ^2.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  web3dart: ^3.0.2
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  crypto: ^3.0.7
  uuid: ^4.5.3
  wallet: ^0.0.18
  google_sign_in: ^6.3.0
  file_picker: ^11.0.2
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  chewie: ^1.8.1
  audioplayers: ^5.2.1
  share_plus: ^12.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
